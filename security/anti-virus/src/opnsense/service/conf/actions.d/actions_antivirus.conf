[start]
command:/usr/local/opnsense/scripts/OPNsense/Antivirus/start.sh
parameters:
type:script
message:starting antivirus

[stop]
command:/usr/local/opnsense/scripts/OPNsense/Antivirus/stop.sh
parameters:
type:script
message:stopping antivirus

[reload]
command:/usr/local/opnsense/scripts/OPNsense/Antivirus/reload.sh
parameters:
type:script
message:reloading antivirus config

[status]
command:/usr/local/opnsense/scripts/OPNsense/Antivirus/status.sh
parameters:
type:script_output
message:query antivirus status

[freshclam]
command:/usr/local/opnsense/scripts/OPNsense/Antivirus/freshclam.sh
parameters:%s
type:script_output
message:Check or install signatures

[version]
command:/usr/local/opnsense/scripts/OPNsense/Antivirus/versions.sh
parameters:
type:script_output
message:Get ClamAV and signature versions

[logs]
command:/usr/local/opnsense/scripts/OPNsense/Antivirus/logs.php
parameters:%s
type:script_output
message:Get Antivirus logs
