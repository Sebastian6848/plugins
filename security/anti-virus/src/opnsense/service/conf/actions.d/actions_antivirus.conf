[start]
command:/bin/sh /usr/local/opnsense/scripts/OPNsense/AntiVirus/start.sh
parameters:
type:script
message:starting industrial anti-virus engine

[stop]
command:/bin/sh /usr/local/opnsense/scripts/OPNsense/AntiVirus/stop.sh
parameters:
type:script
message:stopping industrial anti-virus engine

[restart]
command:/bin/sh /usr/local/opnsense/scripts/OPNsense/AntiVirus/restart.sh
parameters:
type:script
message:restarting industrial anti-virus engine

[status]
command:/bin/sh /usr/local/opnsense/scripts/OPNsense/AntiVirus/status.sh
parameters:
type:script_output
message:requesting industrial anti-virus engine status

[block_ip]
command:/bin/sh /usr/local/opnsense/scripts/OPNsense/AntiVirus/block_ip.sh
parameters:%s %s
type:script_output
message:add source ip to anti-virus block table

[list_blocks]
command:/bin/sh /usr/local/opnsense/scripts/OPNsense/AntiVirus/list_blocks.sh
parameters:
type:script_output
message:list active anti-virus blocked source ip entries

[unblock_ip]
command:/bin/sh /usr/local/opnsense/scripts/OPNsense/AntiVirus/unblock_ip.sh
parameters:%s
type:script_output
message:remove source ip from anti-virus block table