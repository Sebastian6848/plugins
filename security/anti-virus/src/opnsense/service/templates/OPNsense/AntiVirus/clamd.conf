{% if helpers.exists('OPNsense.antivirus.general.enabled') and OPNsense.antivirus.general.enabled == '1' %}
LogTime yes
LogSyslog yes
PidFile /var/run/clamav/clamd.pid
DatabaseDirectory /var/db/clamav
LocalSocket /var/run/clamav/clamd.sock
FixStaleSocket yes
User clamav

ScanHTML no
ScanPDF no
ScanMail no

MaxFileSize {{ OPNsense.antivirus.general.max_file_size_mb }}M
MaxScanSize {{ OPNsense.antivirus.general.max_file_size_mb }}M
MaxRecursion 3
MaxThreads {{ OPNsense.antivirus.general.worker_threads }}
MaxQueue {{ OPNsense.antivirus.general.queue_size }}
{% endif %}