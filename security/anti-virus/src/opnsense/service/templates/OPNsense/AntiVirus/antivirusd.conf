{
  "enabled": {{ 'true' if (helpers.exists('OPNsense.antivirus.general.enabled') and OPNsense.antivirus.general.enabled == '1') else 'false' }},
  "extract_dir": "/var/run/av_extract",
  "max_file_size_mb": {{ OPNsense.antivirus.general.max_file_size_mb if helpers.exists('OPNsense.antivirus.general.max_file_size_mb') else '10' }},
  "queue_size": {{ OPNsense.antivirus.general.queue_size if helpers.exists('OPNsense.antivirus.general.queue_size') else '50' }},
  "worker_threads": {{ OPNsense.antivirus.general.worker_threads if helpers.exists('OPNsense.antivirus.general.worker_threads') else '4' }},
  "cache_ttl_seconds": {{ OPNsense.antivirus.general.cache_ttl_seconds if helpers.exists('OPNsense.antivirus.general.cache_ttl_seconds') else '86400' }},
  "block_duration_seconds": {{ OPNsense.antivirus.general.block_duration_seconds if helpers.exists('OPNsense.antivirus.general.block_duration_seconds') else '3600' }},
  "response_mode": "{{ OPNsense.antivirus.general.response_mode if helpers.exists('OPNsense.antivirus.general.response_mode') else 'block_ip' }}",
  "block_table": "industrial_av_block",
  "clamd_socket": "/var/run/clamav/clamd.sock",
  "extensions": "{{ OPNsense.antivirus.general.extensions if helpers.exists('OPNsense.antivirus.general.extensions') else 'exe,dll,elf,sh,bin' }}",
  "events_log": "/var/log/antivirus_events.log",
  "stats_file": "/var/run/antivirus/stats.json",
  "cache_db": "/var/run/antivirus/hash_cache.db",
  "whitelist": [
    {% set comma = namespace(first=true) %}
    {% if helpers.exists('OPNsense.antivirus.whitelist.entry') %}
      {% for row in OPNsense.antivirus.whitelist.entry %}
        {% if row.enabled == '1' and row.sha256 is defined and row.sha256 != '' %}
          {% if not comma.first %},{% endif %}"{{ row.sha256|lower }}"{% set comma.first = false %}
        {% endif %}
      {% endfor %}
    {% endif %}
  ]
}