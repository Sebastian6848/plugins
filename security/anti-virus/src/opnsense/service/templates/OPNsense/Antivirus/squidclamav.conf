{% if helpers.exists('OPNsense.antivirus.general.enabled') and OPNsense.antivirus.general.enabled == '1' %}
clamd_local /var/run/clamav/clamd.sock
maxsize {{ OPNsense.antivirus.general.max_scan_size|default('5M') }}
scan_archive {{ '1' if OPNsense.antivirus.general.scan_archives|default('1') == '1' else '0' }}
redirect http://127.0.0.1/antivirus_block.html?url=%url&sig=%virus
{% else %}
# Antivirus is disabled.
{% endif %}
