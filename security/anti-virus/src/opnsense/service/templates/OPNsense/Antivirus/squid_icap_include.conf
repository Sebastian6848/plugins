{% if helpers.exists('OPNsense.antivirus.general.enabled') and OPNsense.antivirus.general.enabled == '1' %}
icap_enable on
icap_service service_av_req reqmod_precache icap://127.0.0.1:{{ OPNsense.antivirus.general.icap_port|default('1344') }}/squidclamav
icap_service service_av_resp respmod_precache icap://127.0.0.1:{{ OPNsense.antivirus.general.icap_port|default('1344') }}/squidclamav
adaptation_access service_av_req allow all
adaptation_access service_av_resp allow all
icap_preview_enable on
icap_send_client_ip on
icap_connect_timeout 5
{% if OPNsense.antivirus.general.icap_bypass_on_err|default('1') == '1' %}
icap_service_failure_limit -1
{% else %}
icap_service_failure_limit 0
{% endif %}
{% endif %}
