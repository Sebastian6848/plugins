{% if helpers.exists('OPNsense.antivirus.general.enabled') and OPNsense.antivirus.general.enabled == '1' %}
icap_enable on
acl antivirus_icap_no_body method HEAD OPTIONS
acl antivirus_icap_tunnel method CONNECT
icap_service service_av_req reqmod_precache icap://127.0.0.1:1344/avscan
icap_service service_av_resp respmod_precache icap://127.0.0.1:1344/avscan
adaptation_access service_av_req deny antivirus_icap_no_body
adaptation_access service_av_req deny antivirus_icap_tunnel
adaptation_access service_av_resp deny antivirus_icap_no_body
adaptation_access service_av_resp deny antivirus_icap_tunnel
adaptation_access service_av_req allow all
adaptation_access service_av_resp allow all
icap_preview_enable on
adaptation_send_client_ip on
icap_connect_timeout 5 seconds
deny_info http://127.0.0.1/antivirus_block.html ERR_ACCESS_DENIED
icap_service_failure_limit -1
{% endif %}
