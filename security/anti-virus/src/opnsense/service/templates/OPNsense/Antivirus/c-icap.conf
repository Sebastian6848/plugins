{% if helpers.exists('OPNsense.antivirus.enabled') and OPNsense.antivirus.enabled == '1' %}
PidFile /var/run/c-icap/c-icap.pid
CommandsSocket /var/run/c-icap/c-icap.ctl
Timeout 300
MaxKeepAliveRequests 100
KeepAliveTimeout 600
StartServers 3
MaxServers 10
MinSpareThreads 10
MaxSpareThreads 20
ThreadsPerChild 10
MaxRequestsPerChild 0
Port 127.0.0.1:1344
ServerName antivirus.local
acl localserver srvip 127.0.0.1
RemoteProxyUsers off
TmpDir /var/tmp
MaxMemObject 131072
DebugLevel 1
Pipelining on
SupportBuggyClients off
ModulesDir /usr/local/lib/c_icap
ServicesDir /usr/local/lib/c_icap
TemplateDir /tmp/c-icap/templates/
TemplateDefaultLanguage en
LoadMagicFile /usr/local/etc/c-icap/c-icap.magic
Module logger sys_logger.so
Logger sys_logger
sys_logger.Prefix "c-icap"
Service echo srv_echo.so
Include virus_scan.conf
{% endif %}
