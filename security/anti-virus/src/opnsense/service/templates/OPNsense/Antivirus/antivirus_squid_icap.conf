{% if helpers.exists('OPNsense.antivirus.enabled') and OPNsense.antivirus.enabled == '1' and helpers.exists('OPNsense.antivirus.scan_http') and OPNsense.antivirus.scan_http == '1' %}
icap_enable on
icap_service_failure_limit -1
icap_default_options_ttl 60
adaptation_send_client_ip on
adaptation_send_username off
icap_preview_enable on
icap_preview_size 1024

{% if helpers.exists('OPNsense.antivirus.bypass_on_failure') and OPNsense.antivirus.bypass_on_failure == '1' %}
icap_service antivirus_resp respmod_precache bypass=1 icap://127.0.0.1:1344/avscan
{% else %}
icap_service antivirus_resp respmod_precache bypass=0 icap://127.0.0.1:1344/avscan
{% endif %}

{% if helpers.exists('OPNsense.antivirus.whitelist_domains') and OPNsense.antivirus.whitelist_domains != '' %}
{%   for domain in OPNsense.antivirus.whitelist_domains.split(",") %}
{%     if domain != '' %}
acl antivirus_domain_whitelist dstdomain {{ domain|encode_idna }}
{%     endif %}
{%   endfor %}
adaptation_access antivirus_resp deny antivirus_domain_whitelist
{% endif %}
{% if helpers.exists('OPNsense.antivirus.whitelist_client_ips') and OPNsense.antivirus.whitelist_client_ips != '' %}
{%   for client_ip in OPNsense.antivirus.whitelist_client_ips.split(",") %}
