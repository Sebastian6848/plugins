{%     endif %}
{%   endfor %}
adaptation_access antivirus_resp deny antivirus_client_whitelist
{% endif %}
{% if helpers.exists('OPNsense.antivirus.whitelist_mime_types') and OPNsense.antivirus.whitelist_mime_types != '' %}
