{% if helpers.exists('OPNsense.antivirus.enabled') and OPNsense.antivirus.enabled == '1' %}
LogTime yes
LogSyslog yes
PidFile /var/run/clamav/clamd.pid
DatabaseDirectory /var/db/clamav
LocalSocket /var/run/clamav/clamd.sock
FixStaleSocket yes
TCPSocket 3310
TCPAddr 127.0.0.1
MaxThreads 10
MaxQueue 100
IdleTimeout 30
MaxDirectoryRecursion 20
User clamav
ScanPE yes
ScanELF yes
ScanOLE2 yes
ScanPDF yes
ScanSWF yes
ScanXMLDOCS yes
ScanHWP3 yes
ScanMail yes
ScanHTML yes
{% if helpers.exists('OPNsense.antivirus.scan_archives') and OPNsense.antivirus.scan_archives == '1' %}
ScanArchive yes
{% endif %}
{% if helpers.exists('OPNsense.antivirus.max_scan_size_mb') and OPNsense.antivirus.max_scan_size_mb != '' %}
MaxScanSize {{ OPNsense.antivirus.max_scan_size_mb }}M
MaxFileSize {{ OPNsense.antivirus.max_scan_size_mb }}M
{% else %}
MaxScanSize 50M
MaxFileSize 50M
{% endif %}
MaxRecursion 16
MaxFiles 10000
{% endif %}
