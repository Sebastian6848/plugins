{% if helpers.exists('OPNsense.antivirus.general.enabled') and OPNsense.antivirus.general.enabled == '1' %}
LogTime yes
LogSyslog yes
PidFile /var/run/clamav/clamd.pid
DatabaseDirectory /var/db/clamav
LocalSocket /var/run/clamav/clamd.sock
FixStaleSocket yes
User clamav

ScanArchive {{ 'yes' if OPNsense.antivirus.general.scan_archives|default('1') == '1' else 'no' }}
ScanPE {{ 'yes' if OPNsense.antivirus.general.scan_pe|default('1') == '1' else 'no' }}
ScanPDF {{ 'yes' if OPNsense.antivirus.general.scan_pdf|default('1') == '1' else 'no' }}
MaxScanSize {{ OPNsense.antivirus.general.max_scan_size|default('5M') }}
{% else %}
# Antivirus is disabled.
PidFile /var/run/clamav/clamd.pid
DatabaseDirectory /var/db/clamav
LocalSocket /var/run/clamav/clamd.sock
{% endif %}
