{% if helpers.exists('OPNsense.antivirus.enabled') and OPNsense.antivirus.enabled == '1' %}
Service antivirus_module virus_scan.so
ServiceAlias srv_clamav virus_scan
ServiceAlias avscan virus_scan?allow204=on&mode=simple
{% if helpers.exists('OPNsense.antivirus.scan_filetypes') and OPNsense.antivirus.scan_filetypes != '' %}
virus_scan.ScanFileTypes {{ OPNsense.antivirus.scan_filetypes.replace(',', ' ') }}
{% endif %}
virus_scan.SendPercentData 5
virus_scan.StartSendPercentDataAfter 2M
virus_scan.Allow204Responces on
{% if helpers.exists('OPNsense.antivirus.bypass_on_failure') and OPNsense.antivirus.bypass_on_failure == '1' %}
virus_scan.PassOnError on
{% else %}
virus_scan.PassOnError off
{% endif %}
{% if helpers.exists('OPNsense.antivirus.max_scan_size_mb') and OPNsense.antivirus.max_scan_size_mb != '' %}
virus_scan.MaxObjectSize {{ OPNsense.antivirus.max_scan_size_mb }}M
{% else %}
virus_scan.MaxObjectSize 50M
{% endif %}
Module common clamd_mod.so
clamd_mod.ClamdHost 127.0.0.1
clamd_mod.ClamdPort 3310
{% endif %}
