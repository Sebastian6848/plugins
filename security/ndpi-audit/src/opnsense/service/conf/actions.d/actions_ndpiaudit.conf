[start]
command:/bin/sh /usr/local/opnsense/scripts/OPNsense/NdpiAudit/start.sh
parameters:
type:script
message:starting ndpi audit engine

[stop]
command:/bin/sh /usr/local/opnsense/scripts/OPNsense/NdpiAudit/stop.sh
parameters:
type:script
message:stopping ndpi audit engine

[restart]
command:/bin/sh /usr/local/opnsense/scripts/OPNsense/NdpiAudit/restart.sh
parameters:
type:script
message:restarting ndpi audit engine

[status]
command:/bin/sh /usr/local/opnsense/scripts/OPNsense/NdpiAudit/status.sh
parameters:
type:script_output
message:requesting ndpi audit engine status

[mirror_reload]
command:/bin/sh /usr/local/opnsense/scripts/OPNsense/NdpiAudit/mirror_reload.sh
parameters:
type:script_output
message:reloading ndpi audit mirror pf anchor
